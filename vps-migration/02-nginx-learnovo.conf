# =============================================================================
# Learnovo Frontend + API Proxy — Nginx Configuration
# File: /etc/nginx/sites-available/learnovo
# =============================================================================

# Rate limiting zone (10 req/sec per IP for API)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# --- HTTP → HTTPS redirect (all domains) ---
server {
    listen 80;
    server_name learnovoportal.com *.learnovoportal.com;
    return 301 https://$host$request_uri;
}

# --- www → non-www redirect ---
server {
    listen 443 ssl http2;
    server_name www.learnovoportal.com;

    ssl_certificate /etc/letsencrypt/live/learnovoportal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learnovoportal.com/privkey.pem;

    return 301 https://learnovoportal.com$request_uri;
}

# --- Main server: learnovoportal.com + *.learnovoportal.com ---
server {
    listen 443 ssl http2;
    server_name learnovoportal.com *.learnovoportal.com;

    # --- SSL ---
    ssl_certificate /etc/letsencrypt/live/learnovoportal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learnovoportal.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Frontend root ---
    root /var/www/learnovo/frontend/current;
    index index.html;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        application/wasm;

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Proxy API to backend (port 5000) ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;

        # CORS headers (backend may also set these)
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
    }

    # --- Cache static assets aggressively (Vite hashes filenames) ---
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Don't log favicon/robots ---
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # --- Block dotfiles (except .well-known for certbot) ---
    location ~ /\.(?!well-known) {
        deny all;
    }

    # --- Custom error pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # --- Logs ---
    access_log /var/log/nginx/learnovo-access.log;
    error_log /var/log/nginx/learnovo-error.log;
}
