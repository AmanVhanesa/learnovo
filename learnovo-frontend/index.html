<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/learnovo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Learnovo - Student Management System</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#3EC4B1" />
  <meta name="description" content="Complete school management platform for students, parents, teachers and administrators" />

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Learnovo" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <!-- Splash screens for iOS -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!--
    PWA manifest handling:
    - The static <link rel="manifest"> is stripped at build time (stripManifestLink plugin)
    - For root domain: add static manifest link here
    - For tenant subdomains: apply cached branding instantly, TenantContext adds blob manifest
  -->
  <script>
  (function(){
    // Capture beforeinstallprompt globally BEFORE React mounts
    window.__pwaInstallPrompt=null;
    window.addEventListener('beforeinstallprompt',function(e){
      e.preventDefault();
      window.__pwaInstallPrompt=e;
    });

    var h=location.hostname.toLowerCase();
    var bases=['learnovoportal.com','learnovo.app'];
    var skip=['www','api','admin','app','mail','ftp','staging','dev'];
    var sub=null;
    for(var i=0;i<bases.length;i++){
      if(h!==bases[i]&&h.endsWith('.'+bases[i])){
        sub=h.slice(0,-(bases[i].length+1)).split('.')[0];
        if(!sub||skip.indexOf(sub)!==-1)sub=null;
        break;
      }
    }
    if(!sub){
      // Root domain — add static manifest
      var l=document.createElement('link');
      l.rel='manifest';l.href='/manifest.webmanifest';
      document.head.appendChild(l);
      return;
    }
    // Tenant subdomain — apply cached branding + manifest immediately
    var name=sub.toUpperCase(),color='#3EC4B1',logo='';
    try{
      var c=JSON.parse(localStorage.getItem('pwa_tenant_'+sub));
      if(c&&c.n){
        name=c.n;
        if(c.c)color=c.c;
        if(c.l)logo=c.l;
        document.title=c.n;
        var mt=document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if(mt)mt.content=c.n;
        var desc=document.querySelector('meta[name="description"]');
        if(desc)desc.content=c.n+' \u2014 School Management Portal';
        var th=document.querySelector('meta[name="theme-color"]');
        if(th)th.content=color;
        var ai=document.querySelector('link[rel="apple-touch-icon"]');
        if(ai&&logo)ai.href=logo;
      }
    }catch(e){}
    // Generate blob manifest so Chrome sees it on page load
    var icons=logo
      ?[{src:logo,sizes:'192x192',type:'image/png',purpose:'any'},{src:logo,sizes:'512x512',type:'image/png',purpose:'any maskable'}]
      :[{src:'/icons/icon-192x192.png',sizes:'192x192',type:'image/png',purpose:'any'},{src:'/icons/icon-512x512.png',sizes:'512x512',type:'image/png',purpose:'any maskable'}];
    var m={name:name,short_name:name,description:name+' \u2014 School Management Portal',theme_color:color,background_color:'#ffffff',display:'standalone',orientation:'portrait-primary',scope:'/',start_url:'/',categories:['education','productivity'],icons:icons};
    var blob=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
    var ml=document.createElement('link');
    ml.rel='manifest';ml.href=URL.createObjectURL(blob);
    document.head.appendChild(ml);
  })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
