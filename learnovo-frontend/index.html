<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/learnovo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Learnovo - Student Management System</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#3EC4B1" />
  <meta name="description" content="Complete school management platform for students, parents, teachers and administrators" />

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Learnovo" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <!-- Splash screens for iOS -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!--
    PWA manifest handling:
    - The static <link rel="manifest"> is stripped at build time (stripManifestLink plugin)
    - For root domain: add static manifest link here
    - For tenant subdomains: apply cached branding instantly, TenantContext adds blob manifest
  -->
  <script>
  (function(){
    var h=location.hostname.toLowerCase();
    var bases=['learnovoportal.com','learnovo.app'];
    var skip=['www','api','admin','app','mail','ftp','staging','dev'];
    var sub=null;
    for(var i=0;i<bases.length;i++){
      if(h!==bases[i]&&h.endsWith('.'+bases[i])){
        sub=h.slice(0,-(bases[i].length+1)).split('.')[0];
        if(!sub||skip.indexOf(sub)!==-1)sub=null;
        break;
      }
    }
    if(!sub){
      // Root domain — add static manifest
      var l=document.createElement('link');
      l.rel='manifest';l.href='/manifest.webmanifest';
      document.head.appendChild(l);
      return;
    }
    // Tenant subdomain — apply cached branding immediately
    try{
      var c=JSON.parse(localStorage.getItem('pwa_tenant_'+sub));
      if(c&&c.n){
        document.title=c.n;
        var mt=document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if(mt)mt.content=c.n;
        var desc=document.querySelector('meta[name="description"]');
        if(desc)desc.content=c.n+' \u2014 School Management Portal';
        var th=document.querySelector('meta[name="theme-color"]');
        if(th&&c.c)th.content=c.c;
        var ai=document.querySelector('link[rel="apple-touch-icon"]');
        if(ai&&c.l)ai.href=c.l;
      }
    }catch(e){}
  })();
  </script>
</head>

<body class="pwa-splash" style="background-color: #ffffff; margin: 0;">
  <!-- Inline splash screen — visible until React mounts -->
  <div id="splash" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#ffffff;">
    <img id="splash-logo" src="/learnovo.png" alt="" width="80" height="80" style="border-radius:16px;background:#ffffff;" />
  </div>
  <script>
    // On tenant subdomains, show cached tenant logo instead of default Learnovo logo
    (function(){
      var h=location.hostname.toLowerCase();
      var bases=['learnovoportal.com','learnovo.app'];
      var sub=null;
      for(var i=0;i<bases.length;i++){
        if(h!==bases[i]&&h.endsWith('.'+bases[i])){
          sub=h.slice(0,-(bases[i].length+1)).split('.')[0];break;
        }
      }
      if(!sub)return;
      try{
        var c=JSON.parse(localStorage.getItem('pwa_tenant_'+sub));
        if(c&&c.l){
          var img=document.getElementById('splash-logo');
          if(img){img.src=c.l;img.width=120;img.height=120;}
        }
      }catch(e){}
    })();
  </script>
  <div id="root"></div>
  <script>
    // Hide splash + remove pwa-splash class as soon as React renders
    var ro = new MutationObserver(function() {
      var root = document.getElementById('root');
      if (root && root.childNodes.length > 0) {
        var splash = document.getElementById('splash');
        if (splash) splash.style.display = 'none';
        document.body.classList.remove('pwa-splash');
        ro.disconnect();
      }
    });
    ro.observe(document.getElementById('root'), { childList: true });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
