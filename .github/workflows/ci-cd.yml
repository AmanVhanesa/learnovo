name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  MONGODB_TEST_URI: mongodb://localhost:27017/learnovo_test
  JWT_SECRET: test-secret-key

jobs:

  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: learnovo-backend/package-lock.json

      - name: Install dependencies
        working-directory: learnovo-backend
        run: npm ci

      - name: Run Linter
        working-directory: learnovo-backend
        run: npm run lint --if-present


  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: learnovo-backend/package-lock.json

      - name: Install dependencies
        working-directory: learnovo-backend
        run: npm ci --ignore-scripts

      - name: Run Security Audit
        working-directory: learnovo-backend
        run: npm audit --audit-level=high || true


  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: learnovo-backend/package-lock.json

      - name: Install dependencies
        working-directory: learnovo-backend
        run: npm ci

      - name: Run Unit Tests
        working-directory: learnovo-backend
        run: npm run test:unit --if-present

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: learnovo-backend/coverage/lcov.info
          fail_ci_if_error: false


  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: learnovo-backend/package-lock.json

      - name: Install dependencies
        working-directory: learnovo-backend
        run: npm ci

      - name: Wait for MongoDB
        run: |
          until nc -z localhost 27017; do
            echo "Waiting for MongoDB..."
            sleep 2
          done

      - name: Run Integration Tests
        working-directory: learnovo-backend
        run: npm run test:integration --if-present


  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [lint, security-scan, test-unit, test-integration]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: learnovo-backend/package-lock.json

      - name: Install production dependencies
        working-directory: learnovo-backend
        run: npm ci --omit=dev

      - name: Build Application
        working-directory: learnovo-backend
        run: npm run build --if-present

      - name: Package App
        run: tar -czf learnovo-backend.tar.gz learnovo-backend

      - uses: actions/upload-artifact@v4
        with:
          name: learnovo-backend
          path: learnovo-backend.tar.gz


  deploy-production:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"


  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [build]
    if: always()

    steps:
      - name: Success
        if: ${{ needs.build.result == 'success' }}
        run: echo "✅ Pipeline successful"

      - name: Failure
        if: ${{ needs.build.result != 'success' }}
        run: echo "❌ Pipeline failed"