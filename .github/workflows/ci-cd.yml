name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:4.4
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongo --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB
        run: |
          until nc -z localhost 27017; do
            echo "Waiting for MongoDB..."
            sleep 2
          done

      - name: Run Unit Tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          MONGODB_TEST_URI: mongodb://localhost:27017/learnovo_test
          JWT_SECRET: test-secret-key

      - name: Run Integration Tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          MONGODB_TEST_URI: mongodb://localhost:27017/learnovo_test
          JWT_SECRET: test-secret-key

      - name: Generate Coverage
        run: npm run test:ci -- --coverage
        env:
          NODE_ENV: test
          MONGODB_TEST_URI: mongodb://localhost:27017/learnovo_test
          JWT_SECRET: test-secret-key

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: tests
          name: codecov-report

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm

      - name: Install Production Dependencies
        run: npm ci --omit=dev

      - name: Build Application
        run: |
          echo "Application built successfully"
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"

      - name: Create Deployment Package
        run: |
          tar -czf learnovo-backend.tar.gz \
          --exclude=node_modules \
          --exclude=.git \
          --exclude=tests \
          --exclude=coverage \
          .

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run Security Audit
        run: npm audit --audit-level high

      - name: Check for Known Vulnerabilities
        run: |
          if npm audit --audit-level high --json | jq '.vulnerabilities | length' | grep -q '[1-9]'; then
            echo "Security vulnerabilities found!"
            exit 1
          else
            echo "No high severity vulnerabilities found"
          fi

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [test, build, security]
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          echo "Running migrations..."
          echo "Deploying application..."
          echo "Restarting services..."
          echo "Running health checks..."

  deploy-production:
    runs-on: ubuntu-latest
    needs: [test, build, security]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          echo "Running database migrations..."
          echo "Deploying application..."
          echo "Restarting services..."
          echo "Running health checks..."

  notify:
    runs-on: ubuntu-latest
    needs: [test, build, security]
    if: always()

    steps:
      - name: Notify Success
        if: ${{ needs.test.result == 'success' && needs.build.result == 'success' && needs.security.result == 'success' }}
        run: echo "✅ CI/CD Pipeline successful!"

      - name: Notify Failure
        if: ${{ needs.test.result == 'failure' || needs.build.result == 'failure' || needs.security.result == 'failure' }}
        run: |
          echo "❌ CI/CD Pipeline failed"
          exit 1