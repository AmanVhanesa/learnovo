name: Deploy Frontend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'learnovo-frontend/**'

  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            # Acquire deploy lock to prevent concurrent deploys with backend
            LOCKFILE="/tmp/learnovo-deploy.lock"
            exec 200>"$LOCKFILE"
            flock -n 200 || { echo "Another deploy is running. Waiting..."; flock 200; }

            /var/www/learnovo/deploy.sh
          command_timeout: 15m
