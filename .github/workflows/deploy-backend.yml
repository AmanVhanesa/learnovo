name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'learnovo-backend/**'

  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | tail -1)/bin:$PATH:/usr/local/bin"
            echo "========================================="
            echo "Deploying Learnovo Backend..."
            echo "========================================="
            cd /var/www/learnovo/frontend-repo

            # Acquire deploy lock to prevent concurrent deploys
            LOCKFILE="/tmp/learnovo-deploy.lock"
            exec 200>"$LOCKFILE"
            flock -n 200 || { echo "Another deploy is running. Waiting..."; flock 200; }

            echo "Commit before deploy: $(git rev-parse HEAD)"
            git fetch origin main
            git reset --hard origin/main
            echo "Commit after deploy: $(git rev-parse HEAD)"

            cd learnovo-backend
            echo "Installing dependencies..."
            npm ci --omit=dev
            echo "Restarting PM2..."
            pm2 restart learnovo-backend || pm2 start server.js --name learnovo-backend

            # Verify the process is running
            sleep 3
            pm2 pid learnovo-backend | grep -q '[0-9]' || { echo "ERROR: Backend failed to start!"; pm2 logs learnovo-backend --lines 20 --nostream; exit 1; }

            echo "========================================="
            echo "Backend deployed successfully!"
            echo "========================================="
          command_timeout: 5m
