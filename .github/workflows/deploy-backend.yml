name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'learnovo-backend/**'

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | tail -1)/bin:$PATH:/usr/local/bin"
            echo "========================================="
            echo "Deploying Learnovo Backend..."
            echo "========================================="
            cd /var/www/learnovo/frontend-repo
            git fetch origin main
            git reset --hard origin/main
            cd learnovo-backend
            echo "Installing dependencies..."
            npm ci --omit=dev
            echo "Restarting PM2..."
            pm2 restart learnovo-backend || pm2 start server.js --name learnovo-backend
            echo "========================================="
            echo "Backend deployed successfully!"
            echo "========================================="
          command_timeout: 5m
